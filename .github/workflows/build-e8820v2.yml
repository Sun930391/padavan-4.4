name: Build Padavan for E8820V2 with xray

on:
  workflow_dispatch:   # 允许手动触发

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Install dependencies
        run: |
          sudo apt update
          sudo apt install -y unzip libtool-bin curl cmake gperf gawk flex bison nano xxd \
            fakeroot kmod cpio git python3-docutils gettext automake autopoint \
            texinfo build-essential help2man pkg-config zlib1g-dev libgmp3-dev \
            libmpc-dev libmpfr-dev libncurses5-dev libltdl-dev wget libc-dev-bin

      - name: Prepare toolchain
        run: |
          cd toolchain-mipsel
          sh dl_toolchain.sh
          cd ..

      - name: Customize E8820V2 config (enable USB)
        run: |
          cd trunk/configs/templates/
          # 追加 USB 相关配置（如果已存在则覆盖）
          echo "CONFIG_USB_SUPPORT=y" >> E8820V2.config
          echo "CONFIG_USB_OHCI=y" >> E8820V2.config
          echo "CONFIG_USB_EHCI=y" >> E8820V2.config
          echo "CONFIG_USB_XHCI=y" >> E8820V2.config
          echo "CONFIG_USB_STORAGE=y" >> E8820V2.config
          echo "CONFIG_FIRMWARE_INCLUDE_NTFS_3G=y" >> E8820V2.config
          echo "CONFIG_FIRMWARE_INCLUDE_EXFAT=y" >> E8820V2.config
          echo "CONFIG_FIRMWARE_INCLUDE_SMBD36=y" >> E8820V2.config
          # 可按需添加其他 USB 服务
          cd ../../..

      - name: Download xray binary (mipsel) and copy to romfs
        run: |
          # 请替换为你的 xray 下载链接（必须为 mipsel 静态编译版）
          XRAY_URL="https://github.com/Sun930391/padavan-4.4/raw/refs/heads/main/xray"   # ← 这里换成真实 URL
          wget -O /tmp/xray ${XRAY_URL}
          chmod +x /tmp/xray
          # 编译脚本会在打包前将文件复制进 romfs，我们提前准备一个钩子
          # 方法：在 build_firmware_modify 脚本中插入复制命令
          cd trunk
          # 备份原始脚本
          cp build_firmware_modify build_firmware_modify.bak
          # 在 "make" 完成之后（搜索 "gen_trx" 前）插入 cp 命令
          sed -i '/^[[:space:]]*make[[:space:]]/a \\tcp /tmp/xray \${ROMFSDIR}/usr/bin/\n\tchmod 755 \${ROMFSDIR}/usr/bin/xray' build_firmware_modify
          cd ..

      - name: Build firmware
        run: |
          cd trunk
          fakeroot ./build_firmware_modify E8820V2

      - name: Upload firmware artifact
        uses: actions/upload-artifact@v3
        with:
          name: padavan-e8820v2-with-xray
          path: trunk/images/*.trx
